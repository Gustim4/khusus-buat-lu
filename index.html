<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="startScreen">
    <button id="startBtn">Klik Untuk Mulai 🎉</button>
  </div>

  <canvas id="canvas"></canvas>

  <audio id="bgm" src="musik.mp3" loop></audio>

  <div id="finalScene">
    
    <div class="photos-side photos-left" id="gallery-left">
      <div class="photo-item"><img src="foto2.jpeg"></div>
      <div class="photo-item"><img src="foto1.jpeg"></div>
      <div class="photo-item"><img src="foto3.jpeg"></div>
    </div>

    <div class="card" id="main-card">
      <div class="heart-nav heart-nav-left" onclick="navigasiSamping('kiri')" title="Geser"></div>

      <h1>Happy Birthday 🎉</h1>
      <p><b>zulpee</b></p>
      <p>
        Semoga makin keren, makin sukses, and semua cita-citanya cepat tercapai.
        Jangan lupa tetap jadi kakak kelas yang asik dan rendah hati yaa 😄
        Sehat selalu dan bahagia terus! btw lu panutan gua sumpah✨
      </p>
      <p>— from your adikell 💖</p>
      
      <div class="card-buttons" style="display: flex; flex-direction: column; gap: 12px; margin: 15px 0; align-items: center;">
        <button id="replayBtn" style="background: none; border: 1px solid #ff4dd2; color: #ff4dd2; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;">
          Tonton Lagi 🔄
        </button>
        <button id="wishBtn" style="background: linear-gradient(45deg, #ff4dd2, #00ffff); border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; box-shadow: 0 0 10px rgba(255,77,210,0.5); transition: transform 0.2s;">
          Ketuk untuk Doa Spesial ✨
        </button>
      </div>

      <div id="openLetterBtn" style="
        position: absolute;
        bottom: 12px;
        left: 20px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        cursor: pointer;
        font-weight: normal;
        transition: all 0.3s ease;
        user-select: none;
        text-decoration: underline;
        text-underline-offset: 3px;
      ">
        ✉️ Baca Surat rahasia, ini wajib clik🗿
      </div>

      <p id="specialWish" style="font-style: italic; color: #ffb3e6; font-size: 13px; min-height: 20px; margin-top: 5px;"></p>

      <div class="heart-nav heart-nav-right" onclick="navigasiSamping('kanan')" title="Geser"></div>
    </div>

    <div class="photos-side photos-right" id="gallery-right">
      <div class="photo-item"><img src="1.png"></div>
      <div class="photo-item"><img src="3.png"></div>
      <div class="photo-item"><img src="2.png"></div>
    </div>

  </div>

  <div id="letterOverlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease;">
    <div style="background: rgba(20, 20, 20, 0.95); border: 2px solid #ff4dd2; color: white; padding: 25px; border-radius: 15px; width: 300px; text-align: center; box-shadow: 0 0 30px rgba(255, 77, 210, 0.6); position: relative;">
      
      <span id="closeLetter" style="position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #ff4dd2; user-select: none;">&times;</span>
      
      <div id="interactiveContent"></div>

    </div>
  </div>

  <div id="photoOverlay">
    <img id="enlargedPhoto" src="">
    <span id="closeOverlay">&times;</span>
  </div>

  <script type="module" src="main.js"></script>

</body>
</html>
